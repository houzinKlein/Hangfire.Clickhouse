name: Release

# Publishes to NuGet.org via Trusted Publishing (OIDC) — no stored API key.
# Trigger by pushing a version tag, e.g.:  git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.1.0)'
        required: true

permissions:
  id-token: write   # required: NuGet Trusted Publishing exchanges this OIDC token for a short-lived key
  contents: write   # required: create the GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true
      TESTCONTAINERS_RYUK_DISABLED: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Derive version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore -p:ContinuousIntegrationBuild=true -p:Version=${{ steps.version.outputs.version }}

      - name: Test
        run: dotnet test -c Release --no-build

      - name: Pack
        # Not --no-build (NU5026): let pack do an incremental build so the per-TFM output exists.
        run: dotnet pack src/HangfireCH/HangfireCH.csproj -c Release --no-restore -p:ContinuousIntegrationBuild=true -p:Version=${{ steps.version.outputs.version }} -o artifacts

      # Idempotent re-tags: if this version is already on nuget.org, skip publishing (but still
      # refresh the GitHub Release below). This keeps --skip-duplicate off so a genuine push
      # failure for a NEW version still fails loudly.
      - name: Skip publish if version already on NuGet
        id: published
        run: |
          pkg="hgf.clickhouse"
          ver="${{ steps.version.outputs.version }}"
          code=$(curl -s -o /dev/null -w '%{http_code}' "https://api.nuget.org/v3-flatcontainer/$pkg/$ver/$pkg.$ver.nupkg")
          if [ "$code" = "200" ]; then
            echo "$pkg $ver already published — skipping NuGet push."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      # Exchanges the GitHub OIDC token for a short-lived NuGet API key.
      # Requires a Trusted Publishing policy on nuget.org and the NUGET_USER repo variable.
      - name: NuGet login (Trusted Publishing)
        id: login
        if: steps.published.outputs.skip != 'true'
        uses: NuGet/login@v1
        with:
          user: ${{ vars.NUGET_USER }}

      - name: Push to NuGet.org
        if: steps.published.outputs.skip != 'true'
        # No --skip-duplicate: it silently swallows nuget.org's 409 (including the spurious
        # "already exists" gallery bug, NuGetGallery#9886), turning a non-publish into a green
        # run. Fail loudly so the real push result is visible in the log.
        run: >
          dotnet nuget push "artifacts/*.nupkg"
          --api-key "${{ steps.login.outputs.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json

      - name: Create or update GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ github.ref_name }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            # Release already exists (e.g. re-running the tag): refresh the attached packages.
            gh release upload "$tag" artifacts/*.nupkg --clobber
          else
            gh release create "$tag" artifacts/*.nupkg --generate-notes --verify-tag
          fi
